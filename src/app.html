<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Cahnon</title>
		<!-- Phase 2.3: Preload critical fonts to prevent FOUT -->
		<link
			rel="preload"
			href="/fonts/inter/Inter-Latin.woff2"
			as="font"
			type="font/woff2"
			crossorigin
		/>
		<link
			rel="preload"
			href="/fonts/source-serif-4/SourceSerif4-Latin.woff2"
			as="font"
			type="font/woff2"
			crossorigin
		/>
		<!-- Prevent FOUC: Apply theme settings before render -->
		<script>
			(function () {
				// Color mode (light/dark)
				var savedMode = localStorage.getItem('colorMode');
				var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
				var mode = savedMode || (prefersDark ? 'dark' : 'light');
				var effectiveDark = mode === 'system' ? prefersDark : mode === 'dark';
				document.documentElement.style.colorScheme = effectiveDark ? 'dark' : 'light';
				document.documentElement.dataset.colorMode = mode;

				// Theme palette (cool/warm) — read before anti-flash so colors match
				var savedTheme = localStorage.getItem('themePalette') || 'cool';
				document.documentElement.dataset.theme = savedTheme;

				// Anti-flash: set background color on html element (body doesn't exist yet)
				// Phase 1.1: Updated to match new surface-primary values
				var bg = effectiveDark ? 'oklch(16% 0.016 260)' : 'oklch(99% 0.008 260)';
				if (savedTheme === 'warm') {
					bg = effectiveDark ? 'oklch(16% 0.016 50)' : 'oklch(99% 0.012 73)';
				}
				document.documentElement.style.backgroundColor = bg;
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
